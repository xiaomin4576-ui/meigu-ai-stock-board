name: 美股AI股票早报 · 构建并部署 Pages

# 触发:每天北京 08:07(美股盘后,避开整点 cron 拥堵)自动跑;手动可触发;
# push main 便于 Routine commit 新 calls_*.json 后自动重建看板。
on:
  schedule:
    # GitHub 免费定时常被延迟数小时甚至跳过,故全天错峰多点冗余,提高"打开即当日"的命中率。
    # 用非整点分钟(避开 :00 拥堵)。时间为 UTC,括号注北京。
    - cron: "7 0 * * *"        # 08:07 北京(美股盘后首选)
    - cron: "37 1 * * *"       # 09:37 北京
    - cron: "23 3 * * *"       # 11:23 北京
    - cron: "47 6 * * *"       # 14:47 北京
    - cron: "17 11 * * *"      # 19:17 北京(傍晚再保一次)
  workflow_dispatch: {}
  push:
    branches: [main]

# Pages 部署所需最小权限:写仓库(提交 state/)+ 写 Pages + OIDC 身份令牌
permissions:
  contents: write
  pages: write
  id-token: write

# 同一时刻只跑一份 Pages 部署,防并发部署打架
concurrency:
  group: pages
  cancel-in-progress: false

env:
  TZ: Asia/Shanghai           # 全程北京时间,保证日期与脚本内 timezone(+8) 一致

jobs:
  # ---------------- 构建 + 提交 + 上传 Pages 工件 ----------------
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15        # 防卡死:超时自动失败,释放 concurrency:pages(否则后续 run 永久排队、看板僵死)
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 拉行情:fetch_data.py 已内化容错(重试+UA/session+整体失败回退复用上一份真实 data),
      # 永远 exit 0;|| echo 仅作双保险,绝不中断后续步骤。
      - name: 拉取行情数据(允许失败)
        env:
          TD_API_KEY: ${{ secrets.TD_API_KEY }}   # Twelve Data 行情API(云端稳定取数,配了就走TD,没配回落yfinance)
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}  # Finnhub 美股共识/评级/财报日/财务指标(配了美股升9/9完整评分,没配维持技术分,不影响)
        run: |
          python fetch_data.py || echo "::warning::fetch_data.py 异常,沿用已有 data_*.json 继续"

      - name: 复盘校准
        run: python verify.py

      # 全自动 Claude 研判(需 secret;未配则自动跳过,看板沿用最近一期研判+橙色"研判过期"标注)
      # DeepSeek 研判:只在【手动点更新 / workflow_dispatch】时跑,定时 cron 不做研判(用户要求不自动研判)。
      # 生成当日 calls_<date>.json;失败则沿用最近一期研判、不阻断部署。
      - name: DeepSeek 研判(仅手动触发)
        if: github.event_name == 'workflow_dispatch'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
        run: pip install --quiet requests 2>/dev/null; python research_ds.py || echo "::warning::DeepSeek 研判失败,沿用最近一期研判"

      - name: 研判落台账(复盘闭环)
        run: python log_today.py || echo "::warning::log_today 失败(不阻断)"

      - name: 渲染当日看板
        run: python build_board.py

      - name: 生成历史归档
        run: python build_archive.py

      # 把 state/ 的 HTML 组织进 docs/(Pages 发布根)。验证过:落地页=最新一期+注入归档入口,
      # archive.html=归档页(保持干净),全部 board 副本同目录以保相对链接闭环,.nojekyll 关 Jekyll。
      - name: 组织 Pages 站点到 docs/
        env:
          BOARD_PASSWORD: ${{ secrets.BOARD_PASSWORD }}   # 配了则加密看板(输密码才看),没配则公开
          ENABLE_CNAME: ${{ vars.ENABLE_CNAME }}          # DNS 生效后设仓库变量=1 即绑定 andy4576.com
          DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}   # 更新按钮的触发凭证(fine-grained PAT,仅注入 docs 加密版)
        run: |
          set -euo pipefail
          STATE="state"
          DOCS="docs"
          rm -rf "$DOCS"; mkdir -p "$DOCS"

          # 1) 关闭 Jekyll(下划线/特殊文件不被吞)
          touch "$DOCS/.nojekyll"

          # 1b) 自定义域名:DNS 生效后再激活(改 ENABLE_CNAME=1)。过早绑定会导致 github.io 重定向到未生效域名而打不开。
          if [ "${ENABLE_CNAME:-0}" = "1" ]; then echo "andy4576.com" > "$DOCS/CNAME"; echo "🌐 已绑定 andy4576.com"; fi

          # 2) 所有每期看板原样拷进 docs/(归档页相对链接引用它们,必须同目录)
          cp "$STATE"/ai_stock_board_*.html "$DOCS"/ 2>/dev/null || { echo "❌ 没有任何 ai_stock_board_*.html,中止"; exit 1; }

          # 3) 归档页 state/index.html → docs/archive.html
          if [ -f "$STATE/index.html" ]; then
            cp "$STATE/index.html" "$DOCS/archive.html"
          else
            echo "⚠️ 缺 state/index.html(归档页),archive.html 将缺失(不阻断)"
          fi

          # 4) 最新一期看板 → docs/board.html(真正的内容页)
          LATEST=$(ls -t "$STATE"/ai_stock_board_*.html | head -1)
          echo "📄 看板采用最新一期: $(basename "$LATEST")"
          cp "$LATEST" "$DOCS/board.html"

          # 5) 在 board.html 顶部注入「📚 历史归档」入口(幂等)
          python3 - "$DOCS/board.html" <<'PY'
          import sys
          path = sys.argv[1]
          nav = ('<div class="navbar" style="max-width:1280px;margin:0 auto 12px;text-align:right">'
                 '<a href="index.html" style="color:#a78bfa;text-decoration:none;font-weight:700;font-size:13px;'
                 'background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.3);border-radius:10px;padding:6px 14px;margin-right:8px">'
                 '🏠 首页</a>'
                 '<a href="archive.html" style="color:#60a5fa;text-decoration:none;font-weight:700;font-size:13px;'
                 'background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.3);border-radius:10px;padding:6px 14px">'
                 '📚 历史归档</a></div>')
          html = open(path, encoding="utf-8").read()
          anchor = '<div class="wrap">'
          if anchor in html and 'class="navbar"' not in html:
              html = html.replace(anchor, anchor + nav, 1)
              open(path, "w", encoding="utf-8").write(html)
              print("✅ 已注入 历史归档 入口")
          else:
              print("ℹ️ 跳过注入")
          PY

          # 5b) docs/index.html = 门户首页(两板块入口:同光早报 + 股票看板)。公开、不加密。
          cp portal.html "$DOCS/index.html"
          echo "🏠 门户首页已就位"

          # 5c) 镜像同光早报到 docs/tongguang/(公开仓库,无需 token;每次构建拉最新保持同步)。相对路径,镜像到子目录不破坏。
          rm -rf "$DOCS/tongguang"; mkdir -p "$DOCS/tongguang"
          if git clone --depth 1 -q https://github.com/xiaomin4576-ui/tongguang-ai-daily /tmp/tg 2>/dev/null && [ -d /tmp/tg/docs ]; then
            cp -r /tmp/tg/docs/. "$DOCS/tongguang/" && echo "📰 已镜像同光早报到 /tongguang($(find "$DOCS/tongguang" -type f | wc -l | tr -d ' ') 文件)"
          else
            echo "⚠️ 同光镜像失败(不阻断部署)"
          fi

          # 6) 校验产物
          echo "=== docs/ 内容 ==="; ls -la "$DOCS"
          [ -f "$DOCS/index.html" ]   || { echo "❌ docs/index.html 缺失"; exit 1; }
          [ -f "$DOCS/.nojekyll" ]    || { echo "❌ .nojekyll 缺失"; exit 1; }
          [ -f "$DOCS/board.html" ]   || { echo "❌ docs/board.html 缺失"; exit 1; }
          grep -q "location.replace" "$DOCS/index.html" && echo "✅ index 为防缓存跳转页" || echo "⚠️ index 跳转缺失"
          grep -q 'class="navbar"' "$DOCS/board.html" && echo "✅ 看板含归档入口" || echo "⚠️ 看板未注入归档入口"

          # 6b) 注入"更新按钮"触发凭证:占位符替换成真 token,只进 docs/(随后被加密),不入库 → 不泄露。用单行 python 避免 heredoc 破坏 YAML。
          if [ -n "${DISPATCH_TOKEN:-}" ]; then
            for f in "$DOCS"/*.html; do
              DTFILE="$f" python3 -c "import os; p=os.environ['DTFILE']; h=open(p,encoding='utf-8').read(); open(p,'w',encoding='utf-8').write(h.replace('__DISPATCH_TOKEN__', os.environ.get('DISPATCH_TOKEN',''))) if '__DISPATCH_TOKEN__' in h else None"
            done
            echo "🔑 已注入更新触发凭证到 docs/(将随内容一起加密)"
          else
            echo "ℹ️ 未配 DISPATCH_TOKEN → 更新按钮显示'未配置'(不影响其余功能)"
          fi

          # 7) 密码保护:加密所有内容页(board + archive + 每期看板),index.html 跳转页保持明文。
          #    这样直连任何历史看板文件也要密码,堵住绕过。未配 BOARD_PASSWORD 则公开。
          if [ -n "${BOARD_PASSWORD:-}" ]; then
            pip install --quiet cryptography 2>/dev/null || pip3 install --quiet cryptography
            for f in "$DOCS"/*.html; do
              [ "$(basename "$f")" = "index.html" ] && continue
              python3 encrypt_board.py "$f" "$f"
            done
            grep -q '兆易\|台积电\|建议买入价' "$DOCS/board.html" && { echo "❌ 加密后仍有明文,中止"; exit 1; }
            echo "🔒 已加密全部内容页(密码保护),index 跳转页保持明文"
          else
            echo "ℹ️ 未配 BOARD_PASSWORD → 看板公开(无密码)"
          fi
          echo "✅ docs/ 组织完成,可上传 Pages"

      # 提交 state/(台账+数据,需累积以支撑复盘记分卡)。docs/ 不入库(纯 artifact 部署)。
      # github-actions bot 身份 + [skip ci] 防触发自身死循环;先 rebase 避免与 Routine 竞态导致非快进;无变化则跳过。
      # 非关键步骤:部署用的是 docs/ 工件,不是回写的 state。故 continue-on-error,
      # 即使 push 回写被并发推进打败(非快进),也【绝不阻断后续 Pages 部署】。
      - name: 提交 state/ 回 main(非关键·失败不阻断部署)
        continue-on-error: true
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/
          if git diff --cached --quiet; then
            echo "无变化,跳过提交"; exit 0
          fi
          git commit -m "chore: 自动更新美股AI早报 $(date +%F) [skip ci]"
          for i in 1 2 3; do
            if git push origin HEAD:main; then echo "✅ state 已回写"; exit 0; fi
            echo "push 被拒(远端已推进),拉取合并重试 $i"
            git fetch origin main || true
            git merge -s ours -m "merge: 保留本次 state 回写" origin/main || true
            sleep 2
          done
          echo "::warning::state 回写让步(下次自动追上),不阻断部署"

      - name: 配置 Pages
        uses: actions/configure-pages@v4

      - name: 上传 Pages 工件
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  # ---------------- 部署到 GitHub Pages ----------------
  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10        # 防卡死:Pages 部署超时自动失败,不长期占用 concurrency
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 打印站点地址
        run: echo "📡 看板已上线:${{ steps.deployment.outputs.page_url }}"

  # ---------------- 推送飞书卡片(独立 job,失败不影响部署)----------------
  notify:
    needs: [build, deploy]
    runs-on: ubuntu-latest
    timeout-minutes: 5         # 防卡死:飞书推送超时自动失败
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # secret 缺失则整个 job 静默跳过,绝不报错
      - name: 检查飞书 webhook 是否配置
        id: gate
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          if [ -z "$FEISHU_WEBHOOK" ]; then
            echo "未配置 FEISHU_WEBHOOK,跳过飞书推送"
            echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      # 用 Python 从 state/calls_*.json + data_*.json 直接 json.dump 生成飞书 interactive 卡片 payload,
      # 写到 /tmp/feishu_payload.json —— 彻底规避 shell 转义中文/HTML/范围符的地狱(已对真实种子验证产出合法 JSON)。
      - name: 生成飞书卡片 payload
        if: steps.gate.outputs.ok == 'true'
        env:
          PAGES_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          cat > /tmp/feishu_card.py <<'PYEOF'
          # -*- coding: utf-8 -*-
          import json, os, glob, re
          STATE = "state"

          def jload(p, d=None):
              return json.load(open(p, encoding="utf-8")) if os.path.exists(p) else d

          def strip_html(s):
              return re.sub(r"<[^>]+>", "", s or "").strip()

          files = sorted(glob.glob(os.path.join(STATE, "calls_*.json")))
          if not files:
              raise SystemExit("无 calls_*.json,跳过")
          calls = jload(files[-1])
          m = re.search(r"calls_(\d{4}-\d{2}-\d{2})\.json", os.path.basename(files[-1]))
          date = m.group(1) if m else "未知"
          data = (jload(os.path.join(STATE, f"data_{date}.json"), {}) or {}).get("stocks", {})

          stocks = calls.get("stocks", {})
          ranking = calls.get("ranking") or list(stocks.keys())
          top3 = [tk for tk in ranking if tk in stocks][:3]

          market = strip_html(calls.get("market", ""))
          if len(market) > 160:
              market = market[:158] + "…"

          medal = ["🥇", "🥈", "🥉"]
          lines = []
          for i, tk in enumerate(top3):
              a = stocks.get(tk, {})
              name = (data.get(tk, {}) or {}).get("name", "")
              price = (data.get(tk, {}) or {}).get("price")
              px = f"  现价 ${price}" if price is not None else ""
              lines.append(
                  f"{medal[i]} **{tk}** {name}{px}\n"
                  f"　🎯 建议买入价 **${a.get('buy','—')}** ｜ 📈 目标价 **${a.get('tgt','—')}** ｜ "
                  f"💰 预期收益 **{a.get('ret','—')}**（{a.get('sig','—')}·置信 {a.get('conf','?')}/10）"
              )
          top_md = "\n".join(lines) if lines else "（暂无研判）"

          pages_url = os.environ.get("PAGES_URL", "").strip() or "https://xiaomin4576-ui.github.io/meigu-ai-stock-board/"

          payload = {
              "msg_type": "interactive",
              "card": {
                  "config": {"wide_screen_mode": True},
                  "header": {"template": "blue",
                             "title": {"tag": "plain_text", "content": "📡 美股AI科技股早报"}},
                  "elements": [
                      {"tag": "div", "text": {"tag": "lark_md",
                          "content": f"**📅 {date}** · 长期 6-12 月视角 · 数据 yfinance · Claude 研判"}},
                      {"tag": "hr"},
                      {"tag": "div", "text": {"tag": "lark_md", "content": f"🌡 **市场体制:** {market}"}},
                      {"tag": "hr"},
                      {"tag": "div", "text": {"tag": "lark_md", "content": f"🏆 **买点 Top3:**\n{top_md}"}},
                      {"tag": "action", "actions": [
                          {"tag": "button",
                           "text": {"tag": "plain_text", "content": "📊 打开完整看板"},
                           "type": "primary", "url": pages_url}]},
                      {"tag": "note", "elements": [
                          {"tag": "plain_text",
                           "content": "仅供研究/学习,非投资建议 · 赚钱靠风控不靠高胜率"}]},
                  ],
              },
          }
          with open("/tmp/feishu_payload.json", "w", encoding="utf-8") as f:
              json.dump(payload, f, ensure_ascii=False)
          print("payload 已生成,Top3:", top3, "日期:", date)
          PYEOF
          python /tmp/feishu_card.py

      # POST 飞书,校验返回 code:0;continue-on-error 让飞书挂了不拖累已成功的部署
      - name: 推送飞书
        if: steps.gate.outputs.ok == 'true'
        continue-on-error: true
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          RESP=$(curl -s -X POST "$FEISHU_WEBHOOK" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d @/tmp/feishu_payload.json)
          echo "飞书返回:$RESP"
          CODE=$(echo "$RESP" | python -c "import sys,json; print(json.load(sys.stdin).get('code', -1))" 2>/dev/null || echo "-1")
          if [ "$CODE" != "0" ]; then
            echo "::error::飞书推送失败,code=$CODE"
            exit 1
          fi
          echo "✅ 飞书推送成功"
