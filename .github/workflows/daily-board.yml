name: 美股AI股票早报 · 构建并部署 Pages

# 触发:每天北京 08:07(美股盘后,避开整点 cron 拥堵)自动跑;手动可触发;
# push main 便于 Routine commit 新 calls_*.json 后自动重建看板。
on:
  schedule:
    # GitHub 免费定时常被延迟数小时甚至跳过,故全天错峰多点冗余,提高"打开即当日"的命中率。
    # 用非整点分钟(避开 :00 拥堵)。时间为 UTC,括号注北京。
    - cron: "7 0 * * *"        # 08:07 北京(美股盘后首选)
    - cron: "37 1 * * *"       # 09:37 北京
    - cron: "23 3 * * *"       # 11:23 北京
    - cron: "47 6 * * *"       # 14:47 北京
    - cron: "17 11 * * *"      # 19:17 北京(傍晚再保一次)
    - cron: "37 13 * * *"      # 21:37 北京(晚间:美股盘前/欧洲盘中,头条再新一轮)
  workflow_dispatch:
    inputs:
      mode:
        description: "full=完整(含DeepSeek个股研判) / news=只刷新头条不动研判"
        required: false
        default: "full"
  push:
    branches: [main]

# Pages 部署所需最小权限:写仓库(提交 state/)+ 写 Pages + OIDC 身份令牌
permissions:
  contents: write
  pages: write
  id-token: write

# 同一时刻只跑一份 Pages 部署,防并发部署打架
concurrency:
  group: pages
  cancel-in-progress: false

env:
  TZ: Asia/Shanghai           # 全程北京时间,保证日期与脚本内 timezone(+8) 一致

jobs:
  # ---------------- 构建 + 提交 + 上传 Pages 工件 ----------------
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20        # 防卡死:超时自动失败,释放 concurrency:pages(否则后续 run 永久排队、看板僵死);头条管线加入后 15→20
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 拉行情:fetch_data.py 已内化容错(重试+UA/session+整体失败回退复用上一份真实 data),
      # 永远 exit 0;|| echo 仅作双保险,绝不中断后续步骤。
      - name: 拉取行情数据(允许失败)
        env:
          TD_API_KEY: ${{ secrets.TD_API_KEY }}   # Twelve Data 行情API(云端稳定取数,配了就走TD,没配回落yfinance)
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}  # Finnhub 美股共识/评级/财报日/财务指标(配了美股升9/9完整评分,没配维持技术分,不影响)
        run: |
          python fetch_data.py || echo "::warning::fetch_data.py 异常,沿用已有 data_*.json 继续"

      # 组合层风险(2026-07 指标审计第一批):独立算AI科技口集中度/相关矩阵/组合波动beta回撤,
      # 供看板"组合层风险面板"+研判引擎注入。yfinance批量历史,失败保留上期不落空(不阻断)。
      - name: 组合层风险度量(允许失败)
        run: python portfolio_risk.py || echo "::warning::portfolio_risk.py 异常,沿用上期 portfolio_risk.json"

      - name: 复盘校准
        run: python verify.py

      # 全球头条:采集(Finnhub+东财环球+RSS)→ DeepSeek 双档筛编(宏观/地缘+科技,带传导链)。
      # 每天自动跑(单次调用成本极低);双双容错——失败沿用最近一期头条(渲染层自动复用+新鲜度横幅),绝不阻断。
      - name: 宏观快线采集(允许失败)
        run: python fetch_macro.py || echo "::warning::fetch_macro 异常,沿用最近一期宏观快线"

      - name: 全球头条采集(允许失败)
        env:
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
        run: python fetch_news.py || echo "::warning::fetch_news 异常,沿用已有 news_raw"

      - name: 全球头条研判(DeepSeek·允许失败)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
        run: python research_news_ds.py || echo "::warning::头条研判失败,沿用最近一期"

      # 全自动 Claude 研判(需 secret;未配则自动跳过,看板沿用最近一期研判+橙色"研判过期"标注)
      # DeepSeek 研判:只在【手动点更新 / workflow_dispatch】时跑,定时 cron 不做研判(用户要求不自动研判)。
      # 生成当日 calls_<date>.json;失败则沿用最近一期研判、不阻断部署。
      - name: DeepSeek 研判(仅手动触发,mode=news 时跳过——头条刷新不动个股研判)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode != 'news'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
        run: pip install --quiet requests 2>/dev/null; python research_ds.py || echo "::warning::DeepSeek 研判失败,沿用最近一期研判"

      - name: 研判落台账(复盘闭环)
        run: python log_today.py || echo "::warning::log_today 失败(不阻断)"

      - name: 渲染当日看板
        run: python build_board.py

      - name: 渲染全球头条页(允许失败)
        run: python build_news.py || echo "::warning::build_news 失败(头条页沿用旧版或缺席,不阻断)"

      - name: 非洲科技脉搏采集+渲染(允许失败)
        run: python fetch_africa.py && python build_africa.py || echo "::warning::非洲科技板块生成失败(沿用旧版或缺席,不阻断)"

      - name: 生成历史归档
        run: python build_archive.py

      # 把 state/ 的 HTML 组织进 docs/(Pages 发布根)。验证过:落地页=最新一期+注入归档入口,
      # archive.html=归档页(保持干净),全部 board 副本同目录以保相对链接闭环,.nojekyll 关 Jekyll。
      - name: 组织 Pages 站点到 docs/
        env:
          BOARD_PASSWORD: ${{ secrets.BOARD_PASSWORD }}   # 配了则加密看板(输密码才看),没配则公开
          OPS_PASSWORD: ${{ secrets.OPS_PASSWORD }}        # 运营看板独立管理员密码(不共享站点通行;独立 sessionStorage 键 lumora-admin)
          ENABLE_CNAME: ${{ vars.ENABLE_CNAME }}          # DNS 生效后设仓库变量=1 即绑定 andy4576.com
          DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}   # 更新按钮的触发凭证(fine-grained PAT,仅注入 docs 加密版)
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }} # 盘势问答引擎凭证(仅注入 docs 加密版,且仅在加密开启时)+ 运营看板余额查询
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}          # 问答实时行情工具的美股凭证(同上,仅注入加密版)
          GITHUB_TOKEN: ${{ github.token }}                # 运营看板统计构建健康度用(只读 Actions runs)
        run: |
          set -euo pipefail
          STATE="state"
          DOCS="docs"
          rm -rf "$DOCS"; mkdir -p "$DOCS"

          # 1) 关闭 Jekyll(下划线/特殊文件不被吞)
          touch "$DOCS/.nojekyll"

          # 1a) 谢绝搜索引擎收录(用户确认:私用站,不要被"搜AI"搜出来;门户与各页另有 noindex meta 双保险)
          printf 'User-agent: *\nDisallow: /\n' > "$DOCS/robots.txt"

          # 1b) 自定义域名:DNS 生效后再激活(改 ENABLE_CNAME=1)。过早绑定会导致 github.io 重定向到未生效域名而打不开。
          if [ "${ENABLE_CNAME:-0}" = "1" ]; then echo "andy4576.com" > "$DOCS/CNAME"; echo "🌐 已绑定 andy4576.com"; fi

          # 2) 所有每期看板原样拷进 docs/(归档页相对链接引用它们,必须同目录)
          cp "$STATE"/ai_stock_board_*.html "$DOCS"/ 2>/dev/null || { echo "❌ 没有任何 ai_stock_board_*.html,中止"; exit 1; }

          # 3) 归档页 state/index.html → docs/archive.html
          if [ -f "$STATE/index.html" ]; then
            cp "$STATE/index.html" "$DOCS/archive.html"
          else
            echo "⚠️ 缺 state/index.html(归档页),archive.html 将缺失(不阻断)"
          fi

          # 4) 最新一期看板 → docs/board.html(真正的内容页)
          LATEST=$(ls -t "$STATE"/ai_stock_board_*.html | head -1)
          echo "📄 看板采用最新一期: $(basename "$LATEST")"
          cp "$LATEST" "$DOCS/board.html"

          # 5) 在 board.html 顶部注入「📚 历史归档」入口(幂等)
          python3 - "$DOCS/board.html" <<'PY'
          import sys
          path = sys.argv[1]
          nav = ('<div class="navbar" style="max-width:1280px;margin:0 auto 12px;text-align:right">'
                 '<a href="home.html" style="color:#33d6c5;text-decoration:none;font-weight:700;font-size:13px;'
                 'background:rgba(51,214,197,.1);border:1px solid rgba(51,214,197,.3);border-radius:10px;padding:6px 14px;margin-right:8px">'
                 '🏠 首页</a>'
                 '<a href="archive.html" style="color:#7ab8ff;text-decoration:none;font-weight:700;font-size:13px;'
                 'background:rgba(122,184,255,.1);border:1px solid rgba(122,184,255,.3);border-radius:10px;padding:6px 14px">'
                 '📚 历史归档</a></div>')
          html = open(path, encoding="utf-8").read()
          anchor = '<div class="wrap">'
          if anchor in html and 'class="navbar"' not in html:
              html = html.replace(anchor, anchor + nav, 1)
              open(path, "w", encoding="utf-8").write(html)
              print("✅ 已注入 历史归档 入口")
          else:
              print("ℹ️ 跳过注入")
          PY

          # 5b) docs/home.html = 门户首页(四板块入口)。随后进加密循环;由光之门 index.html 输密码后解密直出。
          #     注入(宏观条+信源数)移到 5c 同光镜像之后——信源池真值要读 /tmp/tg/sources.json(2026-07-15 指标审计F12)。
          cp portal.html "$DOCS/home.html"
          echo "🏠 门户首页(home)已就位(待注入)"

          # 5c) 镜像同光早报到 docs/tongguang/(公开仓库,无需 token;每次构建拉最新保持同步)。相对路径,镜像到子目录不破坏。
          rm -rf "$DOCS/tongguang"; mkdir -p "$DOCS/tongguang"
          if git clone --depth 1 -q https://github.com/xiaomin4576-ui/tongguang-ai-daily /tmp/tg 2>/dev/null && [ -d /tmp/tg/docs ]; then
            cp -r /tmp/tg/docs/. "$DOCS/tongguang/" && echo "📰 已镜像同光早报到 /tongguang($(find "$DOCS/tongguang" -type f | wc -l | tr -d ' ') 文件)"
          else
            echo "⚠️ 同光镜像失败(不阻断部署)"
          fi

          # 5c2) 门户注入:宏观快线一行(过期标日期)+ 信源池真值(读 /tmp/tg/sources.json,读不到降级文案)
          TG_ROOT=/tmp/tg python3 inject_portal_macro.py "$DOCS/home.html" || echo "⚠️ 门户注入失败(不阻断)"
          # 兜底:注入脚本万一崩溃,占位符也绝不上线(有则替换为降级文案/清空)
          HOMEF="$DOCS/home.html" python3 -c "import os; p=os.environ['HOMEF']; h=open(p,encoding='utf-8').read(); open(p,'w',encoding='utf-8').write(h.replace('__SRC_N__','全球信源聚合').replace('__TICKER_N__','核心标的').replace('__MACRO_STRIP__',''))"

          # 5d) 运营看板(镜像完同光后统计其语料)+ 全球头条页 → docs 顶层(随后进统一加密循环,锁 8888)
          TG_DIR="/tmp/tg/docs" python3 build_ops.py || echo "⚠️ build_ops 失败(不阻断)"
          if [ -f "$STATE/ops.html" ]; then cp "$STATE/ops.html" "$DOCS/ops.html"; echo "📊 运营看板已就位"; fi
          if [ -f "$STATE/news.html" ]; then cp "$STATE/news.html" "$DOCS/news.html"; echo "🌍 全球头条页已就位"; fi
          if [ -f "$STATE/africa.html" ]; then cp "$STATE/africa.html" "$DOCS/africa.html"; echo "📡 非洲科技脉搏已就位"; fi

          # 6) 校验产物
          echo "=== docs/ 内容 ==="; ls -la "$DOCS"
          [ -f "$DOCS/home.html" ]    || { echo "❌ docs/home.html(门户首页)缺失"; exit 1; }
          [ -f "$DOCS/.nojekyll" ]    || { echo "❌ .nojekyll 缺失"; exit 1; }
          [ -f "$DOCS/board.html" ]   || { echo "❌ docs/board.html 缺失"; exit 1; }
          grep -q 'class="navbar"' "$DOCS/board.html" && echo "✅ 看板含归档入口" || echo "⚠️ 看板未注入归档入口"

          # 6b) 注入"更新按钮"触发凭证:占位符替换成真 token,只进 docs/(随后被加密),不入库 → 不泄露。用单行 python 避免 heredoc 破坏 YAML。
          if [ -n "${DISPATCH_TOKEN:-}" ]; then
            for f in "$DOCS"/*.html; do
              DTFILE="$f" python3 -c "import os; p=os.environ['DTFILE']; h=open(p,encoding='utf-8').read(); open(p,'w',encoding='utf-8').write(h.replace('__DISPATCH_TOKEN__', os.environ.get('DISPATCH_TOKEN',''))) if '__DISPATCH_TOKEN__' in h else None"
            done
            echo "🔑 已注入更新触发凭证到 docs/(将随内容一起加密)"
          else
            echo "ℹ️ 未配 DISPATCH_TOKEN → 更新按钮显示'未配置'(不影响其余功能)"
          fi

          # 6c) 注入"盘势问答"引擎凭证(DeepSeek):同 6b 占位符模式,但多一道门——只在加密开启时注入,
          #     确保凭证永远只存在于密文页里;未开加密则问答显示"未配置",绝不明文上线。
          if [ -n "${DEEPSEEK_API_KEY:-}" ] && [ -n "${BOARD_PASSWORD:-}" ]; then
            for f in "$DOCS"/*.html; do
              DTFILE="$f" python3 -c "import os; p=os.environ['DTFILE']; h=open(p,encoding='utf-8').read(); open(p,'w',encoding='utf-8').write(h.replace('__QA_KEY__', os.environ.get('DEEPSEEK_API_KEY',''))) if '__QA_KEY__' in h else None"
            done
            echo "🔑 已注入问答引擎凭证到 docs/(将随内容一起加密)"
          else
            echo "ℹ️ 问答凭证未注入(缺 DEEPSEEK_API_KEY 或未开加密)→ 问答面板显示'未配置'"
          fi

          # 6d) 注入问答"实时行情工具"的美股凭证(Finnhub):同 6c,仅加密开启时进密文页
          if [ -n "${FINNHUB_KEY:-}" ] && [ -n "${BOARD_PASSWORD:-}" ]; then
            for f in "$DOCS"/*.html; do
              DTFILE="$f" python3 -c "import os; p=os.environ['DTFILE']; h=open(p,encoding='utf-8').read(); open(p,'w',encoding='utf-8').write(h.replace('__FH_KEY__', os.environ.get('FINNHUB_KEY',''))) if '__FH_KEY__' in h else None"
            done
            echo "🔑 已注入实时行情凭证到 docs/(将随内容一起加密)"
          fi

          # 6e) ✨ 光之门:读【明文 home】生成 docs/index.html —— 品牌闪屏 + 密码校验 + 时光隧道解锁。
          #     内嵌 home 密文 blob(PBKDF2+AES-GCM,与其它加密页同格式);输对密码本地解密→隧道→直出 home。
          #     执行时机关键:凭证注入之后(home 已就绪)、加密循环之前(build_gate 需明文 home)。
          #     未配 BOARD_PASSWORD → build_gate 落 home 明文到 index.html(公开,无门)。
          if [ -n "${BOARD_PASSWORD:-}" ]; then pip install --quiet cryptography 2>/dev/null || pip3 install --quiet cryptography; fi
          python3 build_gate.py "$DOCS/home.html" "$DOCS/index.html"
          [ -f "$DOCS/index.html" ] || { echo "❌ 光之门 index.html 生成失败"; exit 1; }
          if [ -n "${BOARD_PASSWORD:-}" ]; then
            grep -q 'playTunnel' "$DOCS/index.html" && echo "✨ 光之门 index.html 已生成(密码校验+时光隧道)" || { echo "❌ index.html 非光之门(缺隧道逻辑),中止"; exit 1; }
          fi

          # 7) 密码保护:加密所有内容页(home + board + archive + 每期看板),光之门 index.html 保持明文(内嵌 home 密文)。
          #    这样直连任何内容页也要密码,堵住绕过。未配 BOARD_PASSWORD 则公开。
          if [ -n "${BOARD_PASSWORD:-}" ]; then
            pip install --quiet cryptography 2>/dev/null || pip3 install --quiet cryptography
            # 站点内容页用通行密码 8888 加密(键 lumora-pass);index.html 光之门保持明文;ops.html 单独走管理员密码
            for f in "$DOCS"/*.html; do
              bn="$(basename "$f")"
              [ "$bn" = "index.html" ] && continue
              [ "$bn" = "ops.html" ] && continue
              python3 encrypt_board.py "$f" "$f"
            done
            # 运营看板:独立【管理员密码】加密 + 独立 sessionStorage 键 lumora-admin(不与站点 8888 通行共享,输 8888 也进不去)
            if [ -f "$DOCS/ops.html" ]; then
              if [ -n "${OPS_PASSWORD:-}" ]; then
                BOARD_PASSWORD="$OPS_PASSWORD" python3 encrypt_board.py "$DOCS/ops.html" "$DOCS/ops.html" lumora-admin
                echo "🔐 运营看板已用【管理员密码】加密(独立键 lumora-admin)"
              else
                python3 encrypt_board.py "$DOCS/ops.html" "$DOCS/ops.html"   # 未配 OPS_PASSWORD:退用站点密码,绝不明文上线(余额敏感)
                echo "⚠️ 未配 OPS_PASSWORD,运营看板退用站点密码加密"
              fi
            fi
            grep -q '兆易\|台积电\|建议买入价' "$DOCS/board.html" && { echo "❌ board 加密后仍有明文,中止"; exit 1; }
            # home 门户:加密后不得残留板块明文标题(证明 home 已真加密)
            if grep -q '全球 AI 早报' "$DOCS/home.html"; then echo "❌ home 加密后仍有明文,中止"; exit 1; fi
            # 运营看板:加密后不得残留明文(余额敏感),且门用 lumora-admin 键
            if [ -f "$DOCS/ops.html" ] && grep -q '问答语料源\|账户余额' "$DOCS/ops.html"; then echo "❌ ops 加密后仍有明文,中止"; exit 1; fi
            # 光之门:加密循环后 index.html 必须仍是明文光之门(未被误加密,否则用户看不到密码框)
            if ! grep -q 'playTunnel' "$DOCS/index.html"; then echo "❌ 光之门 index.html 被误加密,中止"; exit 1; fi
            # 双保险:任何凭证若在 docs 顶层页面留有明文(加密失效/漏加密),立即中止,绝不上线。
            # 注意 set -e 下 grep 无匹配返回 1 会误杀脚本,必须用 if 形式。
            if [ -n "${DEEPSEEK_API_KEY:-}" ] && grep -qF "${DEEPSEEK_API_KEY}" "$DOCS"/*.html 2>/dev/null; then
              echo "❌ 问答凭证明文泄露,中止"; exit 1
            fi
            if [ -n "${DISPATCH_TOKEN:-}" ] && grep -qF "${DISPATCH_TOKEN}" "$DOCS"/*.html 2>/dev/null; then
              echo "❌ 更新触发凭证明文泄露,中止"; exit 1
            fi
            if [ -n "${FINNHUB_KEY:-}" ] && grep -qF "${FINNHUB_KEY}" "$DOCS"/*.html 2>/dev/null; then
              echo "❌ 实时行情凭证明文泄露,中止"; exit 1
            fi
            echo "🔒 已加密全部内容页(home+board+news+ops+归档,凭证零明文),光之门 index.html 保持明文"
          else
            echo "ℹ️ 未配 BOARD_PASSWORD → 看板公开(无密码)"
          fi
          echo "✅ docs/ 组织完成,可上传 Pages"

      # 提交 state/(台账+数据,需累积以支撑复盘记分卡)。docs/ 不入库(纯 artifact 部署)。
      # github-actions bot 身份 + [skip ci] 防触发自身死循环;先 rebase 避免与 Routine 竞态导致非快进;无变化则跳过。
      # 非关键步骤:部署用的是 docs/ 工件,不是回写的 state。故 continue-on-error,
      # 即使 push 回写被并发推进打败(非快进),也【绝不阻断后续 Pages 部署】。
      - name: 提交 state/ 回 main(非关键·失败不阻断部署)
        continue-on-error: true
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/
          if git diff --cached --quiet; then
            echo "无变化,跳过提交"; exit 0
          fi
          git commit -m "chore: 自动更新美股AI早报 $(date +%F) [skip ci]"
          for i in 1 2 3; do
            if git push origin HEAD:main; then echo "✅ state 已回写"; exit 0; fi
            echo "push 被拒(远端已推进),拉取合并重试 $i"
            git fetch origin main || true
            # -X ours(选项)而非 -s ours(整树覆盖):state冲突偏本次回写,但保留远端新代码——
            # 2026-07-13 实翻车:-s ours 曾把刚推上main的 research_ds 宏观注入整树回滚(cron从旧checkout出发赛跑失败后覆盖)
            git merge -X ours -m "merge: state回写(保留远端代码)" origin/main || git merge --abort || true
            sleep 2
          done
          echo "::warning::state 回写让步(下次自动追上),不阻断部署"

      - name: 配置 Pages
        uses: actions/configure-pages@v4

      - name: 上传 Pages 工件
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  # ---------------- 部署到 GitHub Pages ----------------
  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10        # 防卡死:Pages 部署超时自动失败,不长期占用 concurrency
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 打印站点地址
        run: echo "📡 看板已上线:${{ steps.deployment.outputs.page_url }}"

  # ---------------- 推送飞书卡片(独立 job,失败不影响部署)----------------
  notify:
    needs: [build, deploy]
    runs-on: ubuntu-latest
    timeout-minutes: 5         # 防卡死:飞书推送超时自动失败
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # secret 缺失则整个 job 静默跳过,绝不报错
      - name: 检查飞书 webhook 是否配置
        id: gate
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          if [ -z "$FEISHU_WEBHOOK" ]; then
            echo "未配置 FEISHU_WEBHOOK,跳过飞书推送"
            echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      # 用 Python 从 state/calls_*.json + data_*.json 直接 json.dump 生成飞书 interactive 卡片 payload,
      # 写到 /tmp/feishu_payload.json —— 彻底规避 shell 转义中文/HTML/范围符的地狱(已对真实种子验证产出合法 JSON)。
      - name: 生成飞书卡片 payload
        if: steps.gate.outputs.ok == 'true'
        env:
          PAGES_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          cat > /tmp/feishu_card.py <<'PYEOF'
          # -*- coding: utf-8 -*-
          import json, os, glob, re
          STATE = "state"

          def jload(p, d=None):
              return json.load(open(p, encoding="utf-8")) if os.path.exists(p) else d

          def strip_html(s):
              return re.sub(r"<[^>]+>", "", s or "").strip()

          files = sorted(glob.glob(os.path.join(STATE, "calls_*.json")))
          if not files:
              raise SystemExit("无 calls_*.json,跳过")
          calls = jload(files[-1])
          m = re.search(r"calls_(\d{4}-\d{2}-\d{2})\.json", os.path.basename(files[-1]))
          date = m.group(1) if m else "未知"
          data = (jload(os.path.join(STATE, f"data_{date}.json"), {}) or {}).get("stocks", {})

          stocks = calls.get("stocks", {})
          ranking = calls.get("ranking") or list(stocks.keys())
          top3 = [tk for tk in ranking if tk in stocks][:3]

          market = strip_html(calls.get("market", ""))
          if len(market) > 160:
              market = market[:158] + "…"

          # 2026-07-15 指标审计F13:引擎按当期实况动态声明(此前写死"Claude 研判",DeepSeek 期口径互斥);
          # 币种按标的市场取(此前 Top3 一律 $,A股/港股进榜即错币种)。
          engine = "DeepSeek 研判" if "DeepSeek" in (calls.get("market") or "") else "Claude 研判"
          CUR = {"CN": "¥", "HK": "HK$"}

          medal = ["🥇", "🥈", "🥉"]
          lines = []
          for i, tk in enumerate(top3):
              a = stocks.get(tk, {})
              name = (data.get(tk, {}) or {}).get("name", "")
              price = (data.get(tk, {}) or {}).get("price")
              cs = CUR.get((data.get(tk, {}) or {}).get("market", "US"), "$")
              px = f"  现价 {cs}{price}" if price is not None else ""
              lines.append(
                  f"{medal[i]} **{tk}** {name}{px}\n"
                  f"　🎯 建议买入价 **{cs}{a.get('buy','—')}** ｜ 📈 目标价 **{cs}{a.get('tgt','—')}** ｜ "
                  f"💰 预期收益 **{a.get('ret','—')}**（{a.get('sig','—')}·置信 {a.get('conf','?')}/10）"
              )
          top_md = "\n".join(lines) if lines else "（暂无研判）"

          pages_url = os.environ.get("PAGES_URL", "").strip() or "https://xiaomin4576-ui.github.io/meigu-ai-stock-board/"

          payload = {
              "msg_type": "interactive",
              "card": {
                  "config": {"wide_screen_mode": True},
                  "header": {"template": "blue",
                             "title": {"tag": "plain_text", "content": "📡 美股AI科技股早报"}},
                  "elements": [
                      {"tag": "div", "text": {"tag": "lark_md",
                          "content": f"**📅 {date}** · 长期 6-12 月视角 · 数据 TD/Finnhub+akshare+腾讯 · {engine}"}},
                      {"tag": "hr"},
                      {"tag": "div", "text": {"tag": "lark_md", "content": f"🌡 **市场体制:** {market}"}},
                      {"tag": "hr"},
                      {"tag": "div", "text": {"tag": "lark_md", "content": f"🏆 **买点 Top3:**\n{top_md}"}},
                      {"tag": "action", "actions": [
                          {"tag": "button",
                           "text": {"tag": "plain_text", "content": "📊 打开完整看板"},
                           "type": "primary", "url": pages_url}]},
                      {"tag": "note", "elements": [
                          {"tag": "plain_text",
                           "content": "仅供研究/学习,非投资建议 · 赚钱靠风控不靠高胜率"}]},
                  ],
              },
          }
          with open("/tmp/feishu_payload.json", "w", encoding="utf-8") as f:
              json.dump(payload, f, ensure_ascii=False)
          print("payload 已生成,Top3:", top3, "日期:", date)
          PYEOF
          python /tmp/feishu_card.py

      # POST 飞书,校验返回 code:0;continue-on-error 让飞书挂了不拖累已成功的部署
      - name: 推送飞书
        if: steps.gate.outputs.ok == 'true'
        continue-on-error: true
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          RESP=$(curl -s -X POST "$FEISHU_WEBHOOK" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d @/tmp/feishu_payload.json)
          echo "飞书返回:$RESP"
          CODE=$(echo "$RESP" | python -c "import sys,json; print(json.load(sys.stdin).get('code', -1))" 2>/dev/null || echo "-1")
          if [ "$CODE" != "0" ]; then
            echo "::error::飞书推送失败,code=$CODE"
            exit 1
          fi
          echo "✅ 飞书推送成功"
